name: flutter_biometric_kit
description: >
  Reusable Flutter library for biometric authentication (fingerprint & face).
  Uses MethodChannel directly — no dependency on local_auth.
  Typed error handling and actionable error codes.
version: 1.0.0
homepage: https://github.com/iketutg/flutter_biometric_kit

environment:
  sdk: ^3.11.0
  flutter: ">=3.11.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
